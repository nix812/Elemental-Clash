name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Create PR if needed
        run: |
          gh pr create \
            --repo "$REPO" \
            --head "$BRANCH" \
            --base main \
            --title "Auto: $BRANCH" \
            --body "Automated merge from Claude session." \
          || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}

      - name: Merge PR into main
        run: |
          PR_NUMBER=$(gh pr list \
            --repo "$REPO" \
            --head "$BRANCH" \
            --base main \
            --json number \
            --jq '.[0].number')
          gh pr merge "$PR_NUMBER" --merge --repo "$REPO"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
