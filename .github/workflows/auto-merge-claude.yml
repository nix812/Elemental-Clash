name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Create PR and merge into main
        run: |
          PR_URL=$(gh pr list --repo "$REPO" --head "$BRANCH" --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create --repo "$REPO" --head "$BRANCH" --base main --title "Auto: $BRANCH" --body "Automated merge from Claude session.")
          fi
          PR_NUMBER=$(gh pr view "$PR_URL" --repo "$REPO" --json number --jq '.number')
          gh pr merge "$PR_NUMBER" --merge --repo "$REPO"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
